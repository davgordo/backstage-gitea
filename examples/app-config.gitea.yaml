integrations:
  gitea:
    - host: gitea.apps.example.com
      baseUrl: https://gitea.apps.example.com
      apiBaseUrl: https://gitea.apps.example.com/api/v1
      password: ${GITEA_TOKEN}

catalog:
  providers:
    gitea:
      lab:
        host: gitea.apps.example.com
        organization: contract-first-idp
        branch: main
        catalogPath: /catalog-info.yaml
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 3 }
    github:
      cfidp:
        host: gitea.apps.example.com
        organization: agent-workspace
        catalogPath: /catalog-info.yaml
        filters:
          branch: main
        schedule:
          frequency: { minutes: 10 }
          timeout: { minutes: 3 }

gitea:
  githubCompatibility:
    enabled: true
    providers:
      - githubProviderId: cfidp
        giteaIntegrationHost: gitea.apps.example.com
    templates:
      annotation: backstage-gitea.io/github-compatible
      allowedHosts:
        - from: github.com
          to: gitea.apps.example.com
