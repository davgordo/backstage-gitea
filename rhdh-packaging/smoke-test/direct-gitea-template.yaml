apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gitea-actions-smoke-test
  title: Direct Gitea Actions Smoke Test
  description: Creates a repository, webhook, and pull request using the Gitea actions.
spec:
  owner: guest
  type: service
  parameters:
    - title: Gitea target
      required: [giteaHost, owner, newRepo, webhookUrl, giteaToken]
      properties:
        giteaHost:
          title: Gitea host
          type: string
          default: gitea.apps.example.com
        owner:
          title: Owner or organization
          type: string
        newRepo:
          title: New repository name
          type: string
        webhookUrl:
          title: Webhook receiver URL
          type: string
          format: uri
        giteaToken:
          title: Gitea personal access token
          type: string
          ui:field: Secret
  steps:
    - id: fetchInitial
      name: Fetch initial content
      action: fetch:template
      input:
        url: ./skeleton/initial
        targetPath: initial
        values:
          repository: ${{ parameters.newRepo }}
    - id: fetchChange
      name: Fetch pull-request content
      action: fetch:template
      input:
        url: ./skeleton/change
        targetPath: change
        values:
          repository: ${{ parameters.newRepo }}
    - id: publish
      name: Publish repository
      action: publish:gitea
      input:
        repoUrl: ${{ parameters.giteaHost }}?owner=${{ parameters.owner }}&repo=${{ parameters.newRepo }}
        description: Repository created by the direct Gitea dynamic-plugin smoke test
        sourcePath: initial
        defaultBranch: main
        repoVisibility: private
        token: ${{ secrets.giteaToken }}
    - id: addWebhook
      name: Add webhook
      action: gitea:webhook
      input:
        repoUrl: ${{ parameters.giteaHost }}?owner=${{ parameters.owner }}&repo=${{ parameters.newRepo }}
        webhookUrl: ${{ parameters.webhookUrl }}
        events: [push]
        token: ${{ secrets.giteaToken }}
    - id: createPr
      name: Create pull request
      action: publish:gitea:pull-request
      input:
        repoUrl: ${{ parameters.giteaHost }}?owner=${{ parameters.owner }}&repo=${{ parameters.newRepo }}
        branchName: smoke-test-change
        targetBranchName: main
        title: Add smoke-test change
        description: Verifies the Gitea pull-request action.
        sourcePath: change
        targetPath: smoke-test
        token: ${{ secrets.giteaToken }}
  output:
    repoUrl: ${{ steps.publish.output.remoteUrl }}
    webhookId: ${{ steps.addWebhook.output.hookId }}
    prUrl: ${{ steps.createPr.output.remoteUrl }}
