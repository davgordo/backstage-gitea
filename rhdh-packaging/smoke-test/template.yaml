# Smoke test template for Gitea scaffolder actions
#
# Run this template in RHDH after deploying the dynamic plugin to verify
# all 4 actions work:
#   1. publish:gitea          — create a new Gitea repo and publish content
#   2. gitea:webhook          — configure a webhook on the repo
#   3. publish:gitea:pull-request — create a PR in a second repo
#   4. gitea:branch-protection:create — protect a branch

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gitea-scaffolder-smoke-test
  title: Gitea Scaffolder Actions Smoke Test
  description: |
    Validates all Gitea scaffolder actions (publish, webhook, PR, branch-protection)
    in the RHDH dynamic plugin. Requires a Gitea instance and a personal access token.
spec:
  owner: guest
  type: service

  parameters:
    - title: Gitea Configuration
      required:
        - giteaHost
        - giteaToken
        - owner
        - targetRepo
      properties:
        giteaHost:
          title: Gitea Host
          type: string
          description: Gitea host, e.g. gitea.example.com
          ui:options:
            placeholder: gitea.example.com
        giteaToken:
          title: Gitea Token
          type: string
          description: Personal access token with repo, webhook scope
          ui:widget: password
        owner:
          title: Gitea Owner/Org
          type: string
          description: Gitea user or organization that owns the repos
          ui:options:
            placeholder: platform-team
        newRepo:
          title: New Repository Name
          type: string
          description: Name of the repo to create (step 1)
          default: smoke-test-repo
        targetRepo:
          title: Target Repo for PR
          type: string
          description: Existing repo to receive the PR (step 3)
          ui:options:
            placeholder: system-gitops
        webhookUrl:
          title: Webhook URL
          type: string
          description: URL to receive the webhook (step 2) — can be a test endpoint
          default: 'https://httpbin.org/post'
        branchName:
          title: Branch Name
          type: string
          description: Branch for PR and branch protection
          default: smoke-test-branch

  steps:
    # Step 1 — Create a new repository and publish content
    - id: publish
      name: Create Repository
      action: publish:gitea
      input:
        repoUrl: $(echo "${{ giteaHost }}?owner=${{ owner }}&repo=${{ newRepo }}")
        repoVisibility: public
        defaultBranch: main
        token: ${{ secrets.GITEA_TOKEN }}
        read:
          - .
        writeToPath: .

    # Step 2 — Add branch protection
    - id: protect-branch
      name: Protect Branch
      action: gitea:branch-protection:create
      input:
        repoUrl: $(echo "${{ giteaHost }}?owner=${{ owner }}&repo=${{ newRepo }}")
        branch: ${{ branchName }}
        token: ${{ secrets.GITEA_TOKEN }}
        requiredStatusCheck: ''
        enforceAdmins: false
        allowForcePush: false
        allowDelete: false

    # Step 3 — Configure a webhook
    - id: add-webhook
      name: Configure Webhook
      action: gitea:webhook
      input:
        repoUrl: $(echo "${{ giteaHost }}?owner=${{ owner }}&repo=${{ newRepo }}")
        webhookUrl: ${{ webhookUrl }}
        webhookSecret: smoke-test-secret
        events:
          - push
        token: ${{ secrets.GITEA_TOKEN }}

    # Step 4 — Create a pull request in the target repo
    - id: create-pr
      name: Create Pull Request
      action: publish:gitea:pull-request
      input:
        repoUrl: $(echo "${{ giteaHost }}?owner=${{ owner }}&repo=${{ targetRepo }}")
        branchName: ${{ branchName }}
        targetBranchName: main
        title: 'smoke-test: verify publish:gitea:pull-request action'
        description: |
          This PR was created by the RHDH Gitea scaffolder smoke test.
          If you see this, the dynamic plugin is working correctly.
        sourcePath: .
        targetPath: .
        token: ${{ secrets.GITEA_TOKEN }}

  output:
    repoUrl: ${{ steps.publish.output.remoteUrl }}
    webhookId: ${{ steps.add-webhook.output.id }}
    prUrl: ${{ steps.create-pr.output.prUrl }}
