apiVersion: v1
kind: Secret
metadata:
  name: gitea-postgres
  namespace: gitea
type: Opaque
stringData:
  POSTGRES_USER: gitea
  POSTGRES_PASSWORD: CHANGE_ME_GENERATE_STRONG_PASSWORD
  POSTGRES_DB: gitea
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-postgres
  namespace: gitea
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-postgres
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-postgres
  template:
    metadata:
      labels:
        app: gitea-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          command: ['sh', '-c', 'mkdir -p $PGDATA && exec docker-entrypoint.sh postgres']
          envFrom:
            - secretRef:
                name: gitea-postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-postgres
  namespace: gitea
spec:
  selector:
    app: gitea-postgres
  ports:
    - port: 5432
      targetPort: 5432
