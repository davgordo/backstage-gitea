apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: gitea
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-app-ini
  namespace: gitea
data:
  app.ini: |
    APP_NAME = Gitea: Git with a cup of tea
    RUN_USER = git
    RUN_MODE = prod
    WORK_PATH = /data/gitea

    [repository]
    ROOT = /data/gitea/git/repositories

    [repository.local]
    LOCAL_COPY_PATH = /data/gitea/temp/local-repo

    [repository.upload]
    TEMP_PATH = /data/gitea/temp/uploads

    [server]
    APP_DATA_PATH = /data/gitea
    SSH_DOMAIN = ${GITEA__server__SSH_DOMAIN}
    HTTP_PORT = 3000
    ROOT_URL = ${GITEA__server__ROOT_URL}
    DISABLE_SSH = false
    ; In rootless gitea container only internal ssh server is supported
    START_SSH_SERVER = true
    SSH_PORT = 22
    SSH_LISTEN_PORT = 2222
    BUILTIN_SSH_SERVER_USER = git
    LFS_START_SERVER =
    DOMAIN = ${GITEA__server__DOMAIN}

    [database]
    PATH = /data/gitea/data/gitea.db
    DB_TYPE = postgres
    HOST = gitea-postgres:5432
    NAME = gitea
    USER = gitea
    PASSWD = ${GITEA__database__PASSWD}

    [session]
    PROVIDER_CONFIG = /data/gitea/data/sessions

    [picture]
    AVATAR_UPLOAD_PATH = /data/gitea/data/avatars
    REPOSITORY_AVATAR_UPLOAD_PATH = /data/gitea/data/repo-avatars

    [attachment]
    PATH = /data/gitea/data/attachments

    [log]
    ROOT_PATH = /data/gitea/data/log

    [security]
    INSTALL_LOCK = true
    SECRET_KEY = ${SECRET_KEY}
    REVERSE_PROXY_LIMIT = 1
    REVERSE_PROXY_TRUSTED_PROXIES = *
    INTERNAL_TOKEN = ${GITEA__security__INTERNAL_TOKEN}

    [service]
    DISABLE_REGISTRATION = true
    REQUIRE_SIGNIN_VIEW = false

    [lfs]
    PATH = /data/gitea/git/lfs

    [oauth2]
    JWT_SECRET = ${GITEA__oauth2__JWT_SECRET}

    [packages]
    ENABLED = true

    [packages.npm]
    ENABLED = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: docker.io/gitea/gitea:1.26-rootless
          env:
            - name: GITEA__server__ROOT_URL
              value: "https://gitea.example.com/"
            - name: GITEA__server__DOMAIN
              value: "gitea.example.com"
            - name: HOME
              value: /data/gitea
            - name: GITEA_CUSTOM
              value: /data/gitea/custom
            - name: GITEA_APP_INI
              value: /etc/gitea/app.ini
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
            - name: GITEA_TEMP
              value: /data/gitea/temp
            - name: GITEA_WORK_DIR
              value: /data/gitea
            - name: INSTALL_LOCK
              value: "true"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: SECRET_KEY
            - name: GITEA__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: INTERNAL_TOKEN
            - name: GITEA__oauth2__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: JWT_SECRET
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: gitea-postgres:5432
            - name: GITEA__database__NAME
              valueFrom:
                secretKeyRef:
                  name: gitea-postgres
                  key: POSTGRES_DB
            - name: GITEA__database__USER
              valueFrom:
                secretKeyRef:
                  name: gitea-postgres
                  key: POSTGRES_USER
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-postgres
                  key: POSTGRES_PASSWORD
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 22
          volumeMounts:
            - name: config
              mountPath: /etc/gitea/app.ini
              subPath: app.ini
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: gitea-app-ini
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: ssh
      port: 22
      targetPort: 22
